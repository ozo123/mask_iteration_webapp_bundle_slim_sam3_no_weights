name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-check:
    name: Repository health check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run lightweight checks
        run: python scripts/check_repo.py
